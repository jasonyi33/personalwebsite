<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1226"/>
      <stop offset="1" stop-color="#060814"/>
    </linearGradient>
    <radialGradient id="glow3" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#00CFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00CFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg3)"/>
  <rect width="600" height="400" fill="url(#glow3)"/>
  <!-- merkle tree chain blocks -->
  <g stroke="#00CFFF" fill="none" stroke-width="1.5" opacity="0.85">
    <rect x="120" y="170" width="80" height="60"/>
    <rect x="260" y="170" width="80" height="60"/>
    <rect x="400" y="170" width="80" height="60"/>
    <line x1="200" y1="200" x2="260" y2="200"/>
    <line x1="340" y1="200" x2="400" y2="200"/>
    <!-- chain hash links -->
    <circle cx="160" cy="100" r="14"/>
    <circle cx="300" cy="100" r="14"/>
    <circle cx="440" cy="100" r="14"/>
    <line x1="160" y1="114" x2="160" y2="170"/>
    <line x1="300" y1="114" x2="300" y2="170"/>
    <line x1="440" y1="114" x2="440" y2="170"/>
    <line x1="174" y1="100" x2="286" y2="100"/>
    <line x1="314" y1="100" x2="426" y2="100"/>
  </g>
  <!-- ZK proof marks inside blocks -->
  <g fill="#00CFFF" opacity="0.55">
    <text x="148" y="207" font-family="ui-monospace,monospace" font-size="12">0xA1</text>
    <text x="288" y="207" font-family="ui-monospace,monospace" font-size="12">0xB7</text>
    <text x="428" y="207" font-family="ui-monospace,monospace" font-size="12">0xC4</text>
  </g>
  <text x="32" y="60" font-family="ui-monospace,monospace" font-size="13" fill="#00CFFF" letter-spacing="3">TRACEBASE</text>
  <text x="32" y="370" font-family="ui-monospace,monospace" font-size="11" fill="#8B93A6" letter-spacing="2">ZK • CONSENT • AI COMPLIANCE</text>
</svg>
