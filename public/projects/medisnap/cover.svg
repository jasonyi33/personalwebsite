<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1226"/>
      <stop offset="1" stop-color="#060814"/>
    </linearGradient>
    <radialGradient id="glow4" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#00CFFF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#00CFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg4)"/>
  <rect width="600" height="400" fill="url(#glow4)"/>
  <!-- AR glasses outline -->
  <g stroke="#00CFFF" stroke-width="2" fill="none" opacity="0.9">
    <rect x="170" y="170" width="110" height="70" rx="14"/>
    <rect x="320" y="170" width="110" height="70" rx="14"/>
    <line x1="280" y1="195" x2="320" y2="195"/>
    <line x1="170" y1="195" x2="120" y2="180"/>
    <line x1="430" y1="195" x2="480" y2="180"/>
  </g>
  <!-- HUD reticle/data inside left lens -->
  <g stroke="#00CFFF" stroke-width="1" fill="none" opacity="0.65">
    <circle cx="225" cy="205" r="20"/>
    <line x1="205" y1="205" x2="245" y2="205"/>
    <line x1="225" y1="185" x2="225" y2="225"/>
  </g>
  <!-- data ticks inside right lens -->
  <g fill="#00CFFF" opacity="0.7">
    <rect x="335" y="183" width="40" height="2"/>
    <rect x="335" y="193" width="60" height="2"/>
    <rect x="335" y="203" width="30" height="2"/>
    <rect x="335" y="213" width="50" height="2"/>
    <rect x="335" y="223" width="25" height="2"/>
  </g>
  <!-- caduceus tick -->
  <text x="378" y="155" font-family="ui-monospace,monospace" font-size="14" fill="#E5252A">＋</text>
  <text x="32" y="60" font-family="ui-monospace,monospace" font-size="13" fill="#00CFFF" letter-spacing="3">MEDISNAP</text>
  <text x="32" y="370" font-family="ui-monospace,monospace" font-size="11" fill="#8B93A6" letter-spacing="2">AR • HEALTHCARE • SNAP SPECTACLES</text>
</svg>
